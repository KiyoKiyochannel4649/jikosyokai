<!DOCTYPE html>
<html lang="ja">
<head>

<title>小西拓翔 | PROFILE</title>

<style>
body{
    margin:0;
    font-family: "Arial", sans-serif;
    background: linear-gradient(120deg,#0f2027,#203a43,#2c5364);
    color:white;
}

header{
    text-align:center;
    padding:60px;
}

h1{

    color:#00ffcc;
}

.container{
    width:80%;
    margin:auto;
}

.card{
    background:rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding:30px;
    margin:30px 0;
    border-radius:15px;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
    background:rgba(255,255,255,0.2);
}

h2{
    color:#00ffcc;
}

.skill{
    background:#00ffcc;
    color:black;
    padding:5px 15px;
    border-radius:20px;
    margin:5px;
    display:inline-block;
    font-weight:bold;
}

footer{
    text-align:center;
    padding:20px;
    margin-top:40px;
    background:rgba(0,0,0,0.3);
}
</style>

</head>

<body>

こんにちは！小西拓翔です。<br>

</p>
</div>

<div class="card">
<h2>⚽ 好きなこと</h2>
<span class="skill">サッカー</span>
<span class="skill">ゲーム</span>

</div>

<div class="card">
<h2>🎯 目標</h2>
<p>
・サッカーがもっと上手くなる<br>
・有名な選手みたいにかっこよくプレーする<br>
・毎日楽しく過ごす！
</p>
</div>

</div>

<footer>
<p>© TAKUTO KONISHI</p>
</footer>

</html>
