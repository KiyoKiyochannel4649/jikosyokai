<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cute Girl Candy Game</title>
<style>
body{
margin:0;
background:linear-gradient(#ffd6ec,#ffc0e6);
font-family:sans-serif;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
color:#444;
}

h1{margin-bottom:10px}

canvas{
background:#fff0f8;
border:4px solid #ff8ac2;
border-radius:12px;
}

.info{
margin-top:10px;
font-size:14px;
}
</style>
</head>
<body>

<h1>🎀 Cute Candy Catch 🎀</h1>

<canvas id="game" width="600" height="400"></canvas>

<div class="info">← → キーで女の子を動かしてキャンディを集めよう</div>

<script>
const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let girl = {
 x:280,
 y:320,
 w:40,
 h:60,
 speed:6
}

let candy = {
 x:Math.random()*580,
 y:0,
 size:20,
 speed:3
}

let score = 0

let keys = {}

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

function resetCandy(){
 candy.x = Math.random()*580
 candy.y = 0
}

function update(){

 if(keys["ArrowLeft"]) girl.x -= girl.speed
 if(keys["ArrowRight"]) girl.x += girl.speed

 if(girl.x < 0) girl.x = 0
 if(girl.x + girl.w > canvas.width) girl.x = canvas.width - girl.w

 candy.y += candy.speed

 if(
 candy.y + candy.size > girl.y &&
 candy.x > girl.x &&
 candy.x < girl.x + girl.w
 ){
 score++
 resetCandy()
 }

 if(candy.y > canvas.height){
 resetCandy()
 }
}

function drawGirl(){
 // body
 ctx.fillStyle = "#ff8ac2"
 ctx.fillRect(girl.x, girl.y+20, girl.w, girl.h-20)

 // head
 ctx.beginPath()
 ctx.arc(girl.x+20, girl.y+10, 10, 0, Math.PI*2)
 ctx.fillStyle = "#ffe0cc"
 ctx.fill()

 // eyes
 ctx.fillStyle = "#333"
 ctx.fillRect(girl.x+15,girl.y+8,3,3)
 ctx.fillRect(girl.x+22,girl.y+8,3,3)

 // smile
 ctx.beginPath()
 ctx.arc(girl.x+20,girl.y+12,5,0,Math.PI)
 ctx.stroke()
}

function drawCandy(){
 ctx.fillStyle = "#ff5fa2"
 ctx.beginPath()
 ctx.arc(candy.x, candy.y, candy.size/2, 0, Math.PI*2)
 ctx.fill()
}

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height)

 ctx.fillStyle = "#444"
 ctx.font = "20px sans-serif"
 ctx.fillText("Score: " + score, 10, 25)

 drawGirl()
 drawCandy()
}

function gameLoop(){
 update()
 draw()
 requestAnimationFrame(gameLoop)
}

gameLoop()
</script>

</body>
</html>
