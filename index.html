<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toilet Game</title>
<style>
body{
margin:0;
background:#2c3e50;
font-family:sans-serif;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
color:white;
}

h1{margin-bottom:10px}

canvas{
background:#34495e;
border:4px solid white;
border-radius:10px;
}

.info{
margin-top:10px;
font-size:14px;
}
</style>
</head>
<body>

<h1>🚽 Toilet Catch Game 🚽</h1>

<canvas id="game" width="600" height="400"></canvas>

<div class="info">← → キーでトイレを動かしてトイレットペーパーをキャッチ</div>

<script>
const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let toilet = {
 x:260,
 y:340,
 w:80,
 h:40,
 speed:6
}

let paper = {
 x:Math.random()*560,
 y:0,
 size:20,
 speed:3
}

let score = 0

let keys = {}

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

function resetPaper(){
 paper.x = Math.random()*560
 paper.y = 0
}

function update(){

 if(keys["ArrowLeft"]) toilet.x -= toilet.speed
 if(keys["ArrowRight"]) toilet.x += toilet.speed

 if(toilet.x < 0) toilet.x = 0
 if(toilet.x + toilet.w > canvas.width) toilet.x = canvas.width - toilet.w

 paper.y += paper.speed

 if(
 paper.y + paper.size > toilet.y &&
 paper.x > toilet.x &&
 paper.x < toilet.x + toilet.w
 ){
 score++
 resetPaper()
 }

 if(paper.y > canvas.height){
 resetPaper()
 }
}

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height)

 ctx.fillStyle = "white"
 ctx.font = "20px sans-serif"
 ctx.fillText("Score: " + score, 10, 25)

 // toilet
 ctx.fillStyle = "#ecf0f1"
 ctx.fillRect(toilet.x,toilet.y,toilet.w,toilet.h)

 // falling paper
 ctx.fillStyle = "#ffffff"
 ctx.fillRect(paper.x,paper.y,paper.size,paper.size)
}

function gameLoop(){
 update()
 draw()
 requestAnimationFrame(gameLoop)
}

gameLoop()
</script>

</body>
</html>
