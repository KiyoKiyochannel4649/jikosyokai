<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Takuto Konishi | Football Style Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Noto Sans JP',sans-serif}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.9)),
linear-gradient(90deg,#1f7a34 0%,#2fa84f 50%,#1f7a34 100%);
color:white;
}

.container{
width:520px;
background:rgba(0,0,0,0.55);
border-radius:20px;
padding:40px;
box-shadow:0 0 40px rgba(0,0,0,0.8);
position:relative;
overflow:hidden;
}

.container:before{
content:"";
position:absolute;
inset:0;
background-image:repeating-linear-gradient(
90deg,
transparent,
transparent 48px,
rgba(255,255,255,0.08) 50px
);
opacty:0.2;
pointer-events:none;
}

.title{
font-size:14px;
letter-spacing:4px;
color:#aaa;
margin-bottom:10px;
}

.name{
font-size:38px;
font-weight:700;
letter-spacing:2px;
margin-bottom:8px;
}

.tag{
font-size:14px;
color:#6cff9c;
margin-bottom:30px;
}

.section{
margin:22px 0;
}

.section h3{
font-size:13px;
letter-spacing:3px;
color:#bbb;
margin-bottom:6px;
}

.section p{
font-size:17px;
line-height:1.6;
}

.stats{
display:flex;
justify-content:space-between;
margin-top:30px;
}

.stat{
text-align:center;
}

.stat-number{
font-size:26px;
font-weight:700;
color:#6cff9c;
}

.stat-label{
font-size:12px;
color:#aaa;
letter-spacing:2px;
}

.footer{
margin-top:30px;
font-size:12px;
text-align:center;
color:#777;
letter-spacing:2px;
}

.glow{
position:absolute;
width:300px;
height:300px;
background:radial-gradient(circle,#2cff88,transparent 70%);
filter:blur(120px);
opacty:0.25;
top:-80px;
right:-80px;
}

</style>
</head>

<body>

<div class="container">

<div class="glow"></div>

<div class="title">FOOTBALL PROFILE</div>
<div class="name">TAKUTO KONISHI</div>
<div class="tag">Playmaker of My Own Story ⚽</div>

<div class="section">
<h3>NAME</h3>
<p>小西 拓翔</p>
</div>

<div class="section">
<h3>PLAY STYLE</h3>
<p>
好奇心で前に運ぶドリブラー。<br>
面白い場所・人・経験をゴールに向かって攻め続ける。
</p>
</div>

<div class="section">
<h3>INTEREST</h3>
<p>Football / Travel / Fashion / Friends</p>
</div>

<div class="stats">

<div class="stat">
<div class="stat-number">10</div>
<div class="stat-label">VISION</div>
</div>

<div class="stat">
<div class="stat-number">9</div>
<div class="stat-label">SPEED</div>
</div>

<div class="stat">
<div class="stat-number">11</div>
<div class="stat-label">CREATIVITY</div>
</div>

</div>

<div class="footer">
STADIUM MODE | TAKUTO KONISHI
</div>

</div>

</body>
</html>
