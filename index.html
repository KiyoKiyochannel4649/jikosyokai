<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Takuto Konishi | Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}
.card{
backdrop-filter: blur(10px);
background:rgba(255,255,255,0.08);
padding:40px;
border-radius:20px;
width:420px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
}
.name{
font-size:34px;
font-weight:700;
letter-spacing:2px;
margin-bottom:10px;
}
.subtitle{
font-size:14px;
opacity:0.8;
margin-bottom:30px;
}
.section{
margin:18px 0;
}
.section h3{
font-size:14px;
letter-spacing:2px;
margin-bottom:6px;
opacity:0.7;
}
.section p{
font-size:16px;
}
.footer{
margin-top:30px;
font-size:12px;
opacity:0.6;
}
.line{
height:1px;
background:rgba(255,255,255,0.2);
margin:20px 0;
}
</style>
</head>

<body>

<div class="card">

<div class="name">Takuto Konishi</div>
<div class="subtitle">Creative Mind / Explorer</div>

<div class="line"></div>

<div class="section">
<h3>NAME</h3>
<p>小西 拓翔</p>
</div>

<div class="section">
<h3>ABOUT ME</h3>
<p>新しいことを探すのが好き。<br>
面白い場所、面白い人、面白い体験を求めて動くタイプ。</p>
</div>

<div class="section">
<h3>INTEREST</h3>
<p>Travel / Fashion / Adventure / Friends</p>
</div>

<div class="section">
<h3>MESSAGE</h3>
<p>"Life is better when it’s interesting."</p>
</div>

<div class="line"></div>

<div class="footer">
© Takuto Konishi
</div>

</div>

</body>
</html>
